<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="sun" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Stars/dots bg -->
  <circle cx="50" cy="40" r="1.5" fill="#6ee7b7" opacity="0.4"/>
  <circle cx="150" cy="80" r="1" fill="#6ee7b7" opacity="0.3"/>
  <circle cx="700" cy="30" r="1.5" fill="#6ee7b7" opacity="0.4"/>
  <circle cx="750" cy="90" r="1" fill="#6ee7b7" opacity="0.3"/>
  <circle cx="600" cy="50" r="1" fill="#6ee7b7" opacity="0.3"/>

  <!-- Sun glow -->
  <circle cx="400" cy="130" r="90" fill="url(#sunGlow)"/>
  <!-- Sun -->
  <circle cx="400" cy="130" r="45" fill="url(#sun)" opacity="0.9"/>
  <!-- Sun rays -->
  <g stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="400" y1="68" x2="400" y2="52"/>
    <line x1="400" y1="192" x2="400" y2="208"/>
    <line x1="338" y1="130" x2="322" y2="130"/>
    <line x1="462" y1="130" x2="478" y2="130"/>
    <line x1="356" y1="86" x2="345" y2="75"/>
    <line x1="444" y1="174" x2="455" y2="185"/>
    <line x1="444" y1="86" x2="455" y2="75"/>
    <line x1="356" y1="174" x2="345" y2="185"/>
  </g>

  <!-- API Routes panel -->
  <rect x="60" y="240" width="680" height="130" rx="12" fill="#064e3b" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <rect x="60" y="240" width="680" height="36" rx="12" fill="#065f46" opacity="0.9"/>
  <rect x="60" y="266" width="680" height="10" fill="#065f46" opacity="0.9"/>
  <circle cx="85" cy="258" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="105" cy="258" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="125" cy="258" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="400" y="258" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ee7b7">API REST — Solar Energy Server</text>

  <!-- Routes -->
  <text x="85" y="298" font-family="monospace" font-size="11" fill="#34d399">
    <tspan fill="#86efac">GET </tspan>/api/panels/status
  </text>
  <text x="85" y="316" font-family="monospace" font-size="11" fill="#34d399">
    <tspan fill="#fbbf24">POST</tspan> /api/energy/report
  </text>
  <text x="85" y="334" font-family="monospace" font-size="11" fill="#34d399">
    <tspan fill="#86efac">GET </tspan>/api/production/realtime
  </text>
  <text x="85" y="352" font-family="monospace" font-size="11" fill="#34d399">
    <tspan fill="#f87171">DEL </tspan>/api/panels/:id
  </text>

  <text x="430" y="298" font-family="monospace" font-size="11" fill="#34d399">
    <tspan fill="#fbbf24">PUT </tspan>/api/panels/:id/config
  </text>
  <text x="430" y="316" font-family="monospace" font-size="11" fill="#34d399">
    <tspan fill="#86efac">GET </tspan>/api/alerts/active
  </text>
  <text x="430" y="334" font-family="monospace" font-size="11" fill="#34d399">
    <tspan fill="#fbbf24">POST</tspan> /api/auth/login
  </text>
  <text x="430" y="352" font-family="monospace" font-size="11" fill="#34d399">
    <tspan fill="#86efac">GET </tspan>/api/metrics/daily
  </text>

  <!-- Status badges -->
  <rect x="60" y="390" width="80" height="24" rx="12" fill="#166534" stroke="#22c55e" stroke-width="1"/>
  <text x="100" y="406" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">● Online</text>
  <rect x="155" y="390" width="100" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="205" y="406" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">MongoDB</text>
  <rect x="270" y="390" width="90" height="24" rx="12" fill="#1c1917" stroke="#f59e0b" stroke-width="1"/>
  <text x="315" y="406" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24">Express</text>
  <rect x="375" y="390" width="90" height="24" rx="12" fill="#052e16" stroke="#4ade80" stroke-width="1"/>
  <text x="420" y="406" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">Node.js</text>

  <!-- Title -->
  <text x="400" y="225" text-anchor="middle" font-family="monospace" font-size="17" fill="#4ade80" font-weight="bold">Backend Energía Solar</text>
</svg>
