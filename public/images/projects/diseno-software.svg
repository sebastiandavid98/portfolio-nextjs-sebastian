<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#334155" opacity="0.5"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>

  <!-- UML Class boxes -->
  <!-- Box 1: Main class -->
  <rect x="80" y="80" width="190" height="160" rx="10" fill="url(#card1)" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="80" y="80" width="190" height="36" rx="10" fill="#3b82f6" opacity="0.5"/>
  <rect x="80" y="106" width="190" height="10" rx="0" fill="#3b82f6" opacity="0.5"/>
  <text x="175" y="103" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">«interface»</text>
  <text x="175" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#93c5fd">ISoftwareDesign</text>
  <text x="95" y="140" font-family="monospace" font-size="10" fill="#60a5fa">+ render(): void</text>
  <text x="95" y="158" font-family="monospace" font-size="10" fill="#60a5fa">+ validate(): bool</text>
  <text x="95" y="176" font-family="monospace" font-size="10" fill="#60a5fa">+ compile(): string</text>
  <text x="95" y="194" font-family="monospace" font-size="10" fill="#60a5fa">+ deploy(): void</text>
  <text x="95" y="212" font-family="monospace" font-size="10" fill="#60a5fa">+ test(): Report</text>

  <!-- Box 2 -->
  <rect x="310" y="50" width="180" height="150" rx="10" fill="url(#card2)" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="310" y="50" width="180" height="36" rx="10" fill="#8b5cf6" opacity="0.5"/>
  <rect x="310" y="76" width="180" height="10" rx="0" fill="#8b5cf6" opacity="0.5"/>
  <text x="400" y="73" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">«abstract»</text>
  <text x="400" y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">BasePattern</text>
  <text x="325" y="112" font-family="monospace" font-size="10" fill="#a78bfa">- name: string</text>
  <text x="325" y="128" font-family="monospace" font-size="10" fill="#a78bfa">- version: int</text>
  <text x="325" y="148" font-family="monospace" font-size="10" fill="#a78bfa">+ execute(): void</text>
  <text x="325" y="164" font-family="monospace" font-size="10" fill="#a78bfa">+ rollback(): void</text>
  <text x="325" y="180" font-family="monospace" font-size="10" fill="#a78bfa">+ getState(): State</text>

  <!-- Box 3 -->
  <rect x="530" y="80" width="180" height="140" rx="10" fill="url(#card3)" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="530" y="80" width="180" height="36" rx="10" fill="#06b6d4" opacity="0.5"/>
  <rect x="530" y="106" width="180" height="10" rx="0" fill="#06b6d4" opacity="0.5"/>
  <text x="620" y="103" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">«class»</text>
  <text x="620" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#67e8f9">FactoryMethod</text>
  <text x="545" y="140" font-family="monospace" font-size="10" fill="#22d3ee">+ create(): Product</text>
  <text x="545" y="158" font-family="monospace" font-size="10" fill="#22d3ee">+ register(): void</text>
  <text x="545" y="176" font-family="monospace" font-size="10" fill="#22d3ee">+ destroy(): void</text>
  <text x="545" y="194" font-family="monospace" font-size="10" fill="#22d3ee">+ clone(): Object</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
  </defs>
  <line x1="270" y1="140" x2="308" y2="130" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <line x1="490" y1="120" x2="528" y2="130" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>

  <!-- Bottom boxes: design patterns -->
  <rect x="80" y="290" width="140" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="150" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa" font-weight="bold">Singleton</text>
  <text x="150" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#93c5fd">Creational</text>
  <text x="150" y="355" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Pattern</text>

  <rect x="240" y="290" width="140" height="80" rx="8" fill="#2e1065" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
  <text x="310" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa" font-weight="bold">Observer</text>
  <text x="310" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">Behavioral</text>
  <text x="310" y="355" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Pattern</text>

  <rect x="400" y="290" width="140" height="80" rx="8" fill="#0c4a6e" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
  <text x="470" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee" font-weight="bold">Decorator</text>
  <text x="470" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#67e8f9">Structural</text>
  <text x="470" y="355" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Pattern</text>

  <rect x="560" y="290" width="160" height="80" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="640" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8" font-weight="bold">Strategy</text>
  <text x="640" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">Behavioral</text>
  <text x="640" y="355" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Pattern</text>

  <!-- Title bar -->
  <rect x="0" y="400" width="800" height="50" fill="#0f172a" opacity="0.9"/>
  <text x="400" y="422" text-anchor="middle" font-family="monospace" font-size="16" fill="#60a5fa" font-weight="bold">Sistema de Diseño de Software</text>
  <text x="400" y="442" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569">Java  ·  UML  ·  Design Patterns  ·  Architecture</text>
</svg>
